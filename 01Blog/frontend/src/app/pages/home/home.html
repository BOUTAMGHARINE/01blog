  <div class="nav-content">
    <h1 class="brand-logo">01Blog</h1>
    <div class="search-bar-container">
      <mat-icon>search</mat-icon>
      <input type="text" placeholder="Search...">
    </div>
    <div class="nav-links">
      <button mat-icon-button routerLink="/home" class="nav-btn active">
        <mat-icon>home</mat-icon>
      </button>
      <button mat-icon-button class="nav-btn">
        <mat-icon>notifications</mat-icon>
      </button>
      <button mat-icon-button routerLink="/my-block" class="nav-btn">
        <mat-icon>account_circle</mat-icon>
      </button>
    </div>
  </div>
</nav>

<div class="main-layout">
  <main class="feed-container">

    <section class="create-post-card">
      <div class="composer-body">
        <div class="user-avatar-small"></div>
        <div class="input-wrapper">
          <textarea #postInput 
                    placeholder="What's on your mind?" 
                    (input)="0" 
                    (focus)="isExpanded.set(true)"
                    class="modern-textarea"></textarea>

          <div class="media-preview" *ngIf="selectedMediaUrl">
            <button class="close-preview" (click)="removeMedia()">
              <mat-icon>close</mat-icon>
            </button>
            <img [src]="selectedMediaUrl" *ngIf="mediaType === 'image'">
            <video [src]="selectedMediaUrl" *ngIf="mediaType === 'video'" controls></video>
          </div>
        </div>
      </div>

      <div class="composer-footer" *ngIf="isExpanded()">
        <div class="tool-icons">
          <button (click)="imageInput.click()"><mat-icon>image</mat-icon></button>
          <button (click)="videoInput.click()"><mat-icon>videocam</mat-icon></button>
          
          <input type="file" #imageInput hidden accept="image/*" (change)="onFileSelected($event, 'image')">
          <input type="file" #videoInput hidden accept="video/*" (change)="onFileSelected($event, 'video')">
        </div>
        
        <div class="footer-actions">
          <button class="btn-cancel" (click)="cancelPost(postInput)">Cancel</button>
          <button mat-flat-button 
                  class="btn-post" 
                  [disabled]="!postInput.value.trim() && !selectedMediaUrl"
                  (click)="onPublish(postInput)">
            Post
          </button>
        </div>
      </div>
    </section>

    <div class="posts-list">
      <div *ngIf="posts().length === 0" class="loading-state">
        <p>Loading your feed...</p>
      </div>

      <article class="post-card" *ngFor="let post of posts()">
        <header class="post-header">
          <div class="user-info">
            <div class="user-avatar"></div>
            <div class="user-meta">
              <span class="username">{{ post.author?.username || 'User' }}</span>
              <span class="timestamp">{{ post.createdAt | date:'short' }}</span>
            </div>
          </div>
        </header>

        <div class="post-content">
          <p>{{ post.content }}</p>
          
          <div class="post-media" *ngIf="post.mediaUrl">
            
            <img [src]="post.mediaUrl" *ngIf="post.mediaType === 'IMAGE'" alt="Post image">

            <video controls width="100%" *ngIf="post.mediaType === 'VIDEO'">
              <source [src]="post.mediaUrl" type="video/mp4">
              <source [src]="post.mediaUrl" type="video/webm">
              Your browser does not support the video tag.
            </video>
            
          </div>
        </div>

        <div class="post-divider"></div>

        <footer class="post-footer">
          <button class="like-btn" [class.liked]="post.isLiked" (click)="toggleLike(post)">
            <mat-icon>{{ post.isLiked ? 'favorite' : 'favorite_border' }}</mat-icon>
            <span>{{ post.likesCount || 0 }} Likes</span>
          </button>
        </footer>
      </article>
    </div>
  </main>
</div>
