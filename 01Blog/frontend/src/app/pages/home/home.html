<mat-toolbar color="primary" class="navbar mat-elevation-z4">
  <span class="logo">01Blog</span>
  <span class="spacer"></span>
  <button mat-icon-button routerLink="/home"><mat-icon>home</mat-icon></button>
  <button mat-icon-button><mat-icon>notifications</mat-icon></button>
  <button mat-icon-button routerLink="/my-block"><mat-icon>account_circle</mat-icon></button>
</mat-toolbar>

<div class="home-layout">
  <aside class="sidebar">
    <mat-nav-list>
      <a mat-list-item routerLink="/home" class="active">
        <mat-icon matListItemIcon>dashboard</mat-icon>
        <span matListItemTitle>Feed</span>
      </a>
      </mat-nav-list>
  </aside>

  <main class="main-content">
    
    <mat-card class="create-post-card">
      <mat-card-content>
        <div class="create-post-header">
          <div class="user-avatar-small"></div>
          <textarea #postInput 
                    placeholder="Share your learning journey..." 
                    (focus)="isExpanded = true"
                    (blur)="postInput.value === '' ? isExpanded = false : true"></textarea>
        </div>
        
        <div class="create-post-actions" *ngIf="isExpanded">
          <button mat-button color="primary">
            <mat-icon>image</mat-icon> Photo/Video
          </button>
          <span class="spacer"></span>
          <button mat-raised-button color="accent" [disabled]="postInput.value === ''">Post</button>
        </div>
      </mat-card-content>
    </mat-card>

    <div class="posts-list" *ngIf="posts.length > 0; else noPosts">
      <mat-card class="post-card" *ngFor="let post of posts">
        <mat-card-header>
          <div mat-card-avatar class="user-avatar"></div>
          <mat-card-title>{{ post.username }}</mat-card-title>
          <mat-card-subtitle>{{ post.createdAt | date:'medium' }}</mat-card-subtitle>
        </mat-card-header>
        
        <mat-card-content>
          <p class="post-text">{{ post.content }}</p>
        </mat-card-content>

        <img mat-card-image [src]="post.mediaUrl" alt="Post media" *ngIf="post.mediaUrl">
        
        <mat-divider></mat-divider>

        <mat-card-actions class="post-footer">
          <button mat-button color="primary">
            <mat-icon>favorite_border</mat-icon> Like ({{post.likesCount}})
          </button>
          <button mat-button>
            <mat-icon>chat_bubble_outline</mat-icon> Comment
          </button>
          <button mat-icon-button class="report-btn">
            <mat-icon>outlined_flag</mat-icon>
          </button>
        </mat-card-actions>
      </mat-card>
    </div>

    <ng-template #noPosts>
      <div class="empty-state">
        <mat-icon>auto_awesome</mat-icon>
        <p>No posts yet. Start following other students!</p>
      </div>
    </ng-template>
  </main>
</div>
