<nav class="modern-nav">
  <div class="nav-content">
    <h1 class="brand-logo">01Blog</h1>
    <div class="search-bar-container">
      <mat-icon>search</mat-icon>
      <input type="text" placeholder="Search...">
    </div>
    <div class="nav-links">
      <button mat-icon-button routerLink="/admin" *ngIf="isAdmin()" class="admin-btn">
        <mat-icon>admin_panel_settings</mat-icon>
      </button>
      <button mat-icon-button routerLink="/home" class="nav-btn active">
        <mat-icon>home</mat-icon>
      </button>
      <button mat-icon-button class="nav-btn">
        <mat-icon>notifications</mat-icon>
      </button>
      <button mat-icon-button routerLink="/my-block" class="nav-btn">
        <mat-icon>account_circle</mat-icon>
      </button>
    </div>
  </div>
</nav>

<div class="main-layout">
  <main class="feed-container">

    <section class="create-post-card">
      <div class="composer-body">
        <div class="user-avatar-small"></div>
        <div class="input-wrapper">
          <textarea #postInput placeholder="What's on your mind?" (input)="0" (focus)="isExpanded.set(true)"
            class="modern-textarea"></textarea>

          <div class="media-preview" *ngIf="selectedMediaUrl">
            <button class="close-preview" (click)="removeMedia()">
              <mat-icon>close</mat-icon>
            </button>
            <img [src]="selectedMediaUrl" *ngIf="mediaType === 'image'">
            <video [src]="selectedMediaUrl" *ngIf="mediaType === 'video'" controls></video>
          </div>
        </div>
      </div>

      <div class="composer-footer" *ngIf="isExpanded()">
        <div class="tool-icons">
          <button (click)="imageInput.click()"><mat-icon>image</mat-icon></button>
          <button (click)="videoInput.click()"><mat-icon>videocam</mat-icon></button>
          <input type="file" #imageInput hidden accept="image/*" (change)="onFileSelected($event, 'image')">
          <input type="file" #videoInput hidden accept="video/*" (change)="onFileSelected($event, 'video')">
        </div>
        <div class="footer-actions">
          <button class="btn-cancel" (click)="cancelPost(postInput)">Cancel</button>
          <button mat-flat-button class="btn-post" [disabled]="!postInput.value.trim() && !selectedMediaUrl"
            (click)="onPublish(postInput)">Post</button>
        </div>
      </div>
    </section>

    <div class="posts-list">
      <div *ngIf="posts().length === 0" class="loading-state">
        <p>Loading your feed...</p>
      </div>

      <article class="post-card" *ngFor="let post of posts()">
        <header class="post-header">
          <div class="user-info">
            <div class="user-avatar"></div>
            <div class="user-meta">
              <span class="username">{{ post.author?.username || 'User' }}</span>
              <span class="timestamp">{{ post.createdAt | date:'short' }}</span>
            </div>
          </div>

          <div class="post-options" *ngIf="post.author?.id === currentUserId">
            <button mat-icon-button [matMenuTriggerFor]="postMenu">
              <mat-icon>more_vert</mat-icon>
            </button>
            <mat-menu #postMenu="matMenu">
              <button mat-menu-item (click)="post.isEditing = true">
                <mat-icon>edit</mat-icon>
                <span>Edit</span>
              </button>
              <button mat-menu-item (click)="onDeletePost(post.id)">
                <mat-icon color="warn">delete</mat-icon>
                <span>Delete</span>
              </button>
            </mat-menu>
          </div>
        </header>

        <div class="post-content">
          <p *ngIf="!post.isEditing">{{ post.content }}</p>

          <div class="edit-mode-container" *ngIf="post.isEditing">
            <textarea #editInput class="modern-textarea" [value]="post.content"></textarea>
            <div class="edit-actions">
              <button class="btn-cancel" (click)="post.isEditing = false">Cancel</button>
              <button class="btn-save" (click)="updatePost(post, editInput.value)">Save</button>
            </div>
          </div>

          <div class="post-media" *ngIf="post.mediaUrl && !post.isEditing">
            <img [src]="post.mediaUrl" *ngIf="post.mediaType === 'IMAGE'" alt="Post image">
            <video controls width="100%" *ngIf="post.mediaType === 'VIDEO'">
              <source [src]="post.mediaUrl" type="video/mp4">
            </video>
          </div>
        </div>

        <div class="post-divider"></div>

        <footer class="post-footer">
          <button class="like-btn" [class.liked]="checkIfUserLiked(post)" (click)="toggleLike(post)">
            <mat-icon>{{ checkIfUserLiked(post) ? 'favorite' : 'favorite_border' }}</mat-icon>
            <span>{{ post.reactions?.length || 0 }} Likes</span>
          </button>

          <button class="comment-btn" (click)="post.showComments = !post.showComments">
            <mat-icon>chat_bubble_outline</mat-icon>
            <span>{{ post.comments?.length || 0 }} Comments</span>
          </button>
        </footer>

        <app-post-comments *ngIf="post.showComments" [postId]="post.id" [comments]="post.comments">
        </app-post-comments>
      </article>
    </div>
  </main>
</div>
