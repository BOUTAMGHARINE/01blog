<h2 mat-dialog-title>
  <mat-icon>lock_reset</mat-icon> Change Password
</h2>

<mat-dialog-content>
  <form [formGroup]="passwordForm" class="password-form">
    
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Current Password</mat-label>
      <input matInput type="password" formControlName="oldPassword" placeholder="Enter current password">
      <mat-error *ngIf="passwordForm.get('oldPassword')?.hasError('required')">
        Required field
      </mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>New Password</mat-label>
      <input matInput type="password" formControlName="newPassword" placeholder="Enter new password">
      <mat-error *ngIf="passwordForm.get('newPassword')?.hasError('minlength')">
        Must be at least 6 characters
      </mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Confirm New Password</mat-label>
      <input matInput type="password" formControlName="confirmPassword" placeholder="Confirm new password">
      <mat-error *ngIf="passwordForm.hasError('mismatch')">
        Passwords do not match
      </mat-error>
    </mat-form-field>

  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close>Cancel</button>
  <button mat-flat-button color="primary" 
          [disabled]="passwordForm.invalid" 
          (click)="onSubmit()">
    Update Password
  </button>
</mat-dialog-actions>
