<div class="auth-container">
  <mat-card class="auth-card">
    <mat-card-header>
      <mat-card-title>Join 01Blog</mat-card-title>
      <mat-card-subtitle>Start documenting your journey</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form class="auth-form" [formGroup]="registerForm" (ngSubmit)="onSubmit()">

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Username</mat-label>
          <input matInput placeholder="ExampleLearner" formControlName="username">
          <mat-icon matSuffix>person</mat-icon>
          <mat-error *ngIf="registerForm.get('username')?.hasError('required')">Username is required</mat-error>
          <mat-error *ngIf="registerForm.get('username')?.hasError('minlength')">Minimum 6 characters</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email</mat-label>
          <input matInput type="email" placeholder="student@01blog.com" formControlName="email">
          <mat-icon matSuffix>email</mat-icon>
          <mat-error *ngIf="registerForm.get('email')?.hasError('required')">Email is required</mat-error>
          <mat-error *ngIf="registerForm.get('email')?.hasError('email')">Invalid email format</mat-error>
        </mat-form-field>

        <div class="password-row">
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Password</mat-label>
            <input matInput [type]="hidePassword ? 'password' : 'text'" formControlName="password">
            <button mat-icon-button matSuffix (click)="hidePassword = !hidePassword" type="button" tabindex="-1">
              <mat-icon>{{hidePassword ? 'visibility_off' : 'visibility'}}</mat-icon>
            </button>
            <mat-error *ngIf="registerForm.get('password')?.hasError('required')">Required</mat-error>
            <mat-error *ngIf="registerForm.get('password')?.hasError('minlength')">Min. 8 characters</mat-error>
          </mat-form-field>

          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Confirm</mat-label>
            <input matInput [type]="hidePassword ? 'password' : 'text'" formControlName="confPassword"
              [errorStateMatcher]="confirmMatcher">
            <mat-error *ngIf="registerForm.hasError('mismatch')">Not matching</mat-error>
          </mat-form-field>
        </div>

        <div class="backend-error" *ngIf="errorMessage">
          <mat-icon>error_outline</mat-icon>
          <span>{{ errorMessage }}</span>
        </div>

        <button mat-raised-button color="accent" class="auth-btn" type="submit" [disabled]="registerForm.invalid">
          CREATE MY ACCOUNT
        </button>
      </form>
    </mat-card-content>

    <mat-card-footer class="auth-footer">
      <span>Already registered? <a routerLink="/login">Sign in</a></span>
    </mat-card-footer>
  </mat-card>
</div>
